    <style>
        body{
            background-image: url(https://themes.webuniverseua.com/courses/HTML_CSS/theme12/resources/task2/background.png) ;
        }

        a{
            text-decoration: none;
            font-size: 50px;
            color: black;
            border: 5px solid black;
        }

        a:hover{
            background-color: burlywood;
            border: 5px solid brown;
        }

        a:focus{
            border: 5px solid blue;
            background-color: gray;
            color: white;
        }

        a:active{
            border: 5px solid black;
            background-color: brown;
            color: white;
            border-radius: 20px;
        }

    </style>
</head>
