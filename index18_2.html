<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        div{
            display: flex;
            align-items: center;
        }

        h1{
            color: mediumvioletred;
            font-family: "Monotype Corsiva";
            size: 40px;
        }

        img{
            height: 570px;
        }

        .left{
            margin: 20px;
        }

        form{
            border-radius: 8px;
            padding: 20px;
            width: 280px;
            text-align: center;
            font-size: 14px;
        }

        input, button{
            width: 90%;
            height: 35px;
            margin: 6px 0;
            border-radius: 5px;
            border: 1px solid lightgray;
            padding-left: 8px;
        }

        button{
            background-color: mediumblue;
            color: white;
            border: none;
            font-weight: bold;
        }

        .bbb{
            background-color: mediumvioletred;
            color: white;
            border: none;
            font-weight: bold;
        }

        a{
           text-decoration: none; 
        }
    </style>
</head>
<body>
    <div>
        <div class="left">
            <img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme18/resources/task2/Instagram.png" alt="">
        </div>
        <form action="">
            <h1>Instagram</h1>
            <input type="text" placeholder="Номер телефону або email"> <br>
            <input type="password" placeholder="Пароль">
            <button class="bbb">Увійти</button>
            <hr>АБО<hr>
            <button>Увійти через Facebook</button>
            <a href="#">Забули пароль?</a>
        </form>
    </div>
</body>
</html>
