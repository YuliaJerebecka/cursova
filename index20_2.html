<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: 'Comic Sans MS';
            text-align: center;
            margin: 0;
            padding: 0;
            background-image: url(https://themes.webuniverseua.com/courses/HTML_CSS/theme20/resources/task2/arena.png);
            background-size: cover;
        }

        h1{
            color: #333;
            margin-top: 30px;
        }

        .arena{
            display: flex;
            justify-content: center;
            align-items: start;
            gap: 30px;
            margin-top: 50px;
        }

        .hero{
            position: relative;
            background-color: white;
            border: 3px solid black;
            border-radius: 15px;
            padding: 10px;
            width: 120px;
            height: auto;
        }

        .hero img{
            width: 100px;
            height: auto;
        }

        .name{
            font-weight: bold;
            margin-top: 5px;
            font-size: 18px;
        }

        .desc{
            font-size: 12px;
            color: #555;
            margin-top: 3px;
        }

        .dwarf{
            border-color: #4da6ff;
        }

        .orc{
            border-color: #ff4d4d;
        }

        .elf{
            border-color: #4dff88;
        }
    </style>
</head>
<body>
    <h1 align="center">Герої на арені</h1>
    <div class="arena">
        <div class="hero dwarf">
            <img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme20/resources/task2/dwarf.png" alt="">
            <div class="name">Гном</div>
            <div class="desc">Міцний майстер бойової сокири</div>
        </div>

        <div class="hero orc">
            <img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme20/resources/task2/orc.png" alt="">
            <div class="name">Орк</div>
            <div class="desc">Дика сила, що не знає страху</div>
        </div>

        <div class="hero elf">
            <img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme20/resources/task2/elf.png" alt="">
            <div class="name">Ельф</div>
            <div class="desc">Швидкий і влучний стрілець</div>
        </div>
    </div>
</body>
</html>
