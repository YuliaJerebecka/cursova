<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .orbit-container{
            width: 600px;
            height: 600px;
            position: relative;
        }

        .webuniverse{
            width: 500px;
            position: absolute;
            top: 50%;
            left: 50%;
            animation: orbit 4s linear infinite;
        }

        @keyframes orbit{
            0% {transform: translate(-50%, -50%) rotate(0deg) translateX(80px) rotate(0deg);}
            100% {transform: translate(-50%, -50%) rotate(360deg) translateX(80px) rotate(-360deg);}
        }
    </style>
</head>
<body>
    <div class="orbit-container">
        <img class="webuniverse" src="https://themes.webuniverseua.com/courses/HTML_CSS/theme25/resources/task1/icon.webp" alt="">
    </div>
</body>
</html>
