<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: lightgray;
            font-family: Arial;
        }

        .game-card{
            background-color: white;
            border: 2px solid green;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            width: 700px;
            text-align: left;
        }

        img{
            height: 210px;
            margin-right: 20px;
            border-radius: 5px;
            float: left;
        }

        h1{
            color: #cc0000;
            margin-bottom: 0px;
            margin-top: 0px;
        }

        p{
            font-size: 16px;
            margin: 5px 0;
        }

        .red_text{
            font-size: 18px;
            color: red; 
            font-family: Arial Black;
        }

        a{
            border: 2px solid black;
            border-radius: 5px;
            text-decoration: none;
            padding: 5px;
            color:  #cc0000;
        }

        a:hover{
            background-color: lightpink;
        }



        
    </style>
</head>
<body>
     <div align="center">
        <div class="game-card">
            <img src="https://upload.wikimedia.org/wikipedia/uk/4/48/Minecraft_logo.png" alt="">
            <h1>Minecraft</h1>
            <p>Популярна гра-пісочниця, де можна будувати будь-що та досліджувати світи.</p>
            <p><span class="red_text">Рейтинг:</span> 9.5/10</p>
            <p><span class="red_text">Жанр:</span> Пісочниця, Пригоди</p>
            <p><span class="red_text">Платформи:</span> PC, Console, Mobile</p><br>
            <a href="#">Грати зараз</a>
        </div>
     </div>
</body>
</html>
