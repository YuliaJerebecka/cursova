<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 800px;
            background-color: lightgoldenrodyellow;
            font-family: Tahoma;
            border-collapse: collapse;
        }

        table, td, th{
            border: 2px solid black;
        }

        caption{
            font-size: 26px;
            font-weight: bold;
            color: #ff4500;
        }

        th{
            background-color: coral;
            color: white;
        }

        td{
            text-align: center;
        }

        .class1{
            background-color: lightcyan;
        }

        .class2{
            background-color:  lightyellow;
        }

    </style>
</head>
<body>
    <table align="center" cellpadding="10">
        <caption>Популярні ігри та іграшки</caption>
        <tr>
            <th colspan="2">Іграшковий магазин</th>
            <th colspan="2">Магазин настільних ігор</th>
        </tr>

        <tr class="class1">
            <td>Конструктор LEGO</td>
            <td>450 грн.</td>
            <td>Монополія</td>
            <td>399 грн.</td>
        </tr>

        <tr class="class2">
            <td>М'яка ігррашка</td>
            <td>150 грн.</td>
            <td>Каркассон</td>
            <td>299 грн.</td>
        </tr>

        <tr class="class1">
            <td>Настільна гра "Хід королів"</td>
            <td>350 грн.</td>
            <td>UNO</td>
            <td>199 грн.</td>
        </tr>

        <tr>
            <th colspan="2">Сума витрачених коштів</th>
            <th colspan="2">1847 грн.</th>
        </tr>

    </table>
    
</body>
</html>
