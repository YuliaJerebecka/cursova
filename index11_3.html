<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            background-color: darkslategrey;
            color: azure;
            font-size: 18px;
            border-collapse: collapse;
        }

        table, td, th{
            border:  2px solid black;
            text-align: center;
        }

        th{
            color: orange;
        }

        caption{
            background-color: coral;
            font-size: 24px;
        }

        img{
            width: 250px;
        }

    </style>
</head>
<body>
    <table cellspacing="5" cellpadding="10" align="center">
        <caption>Скіли героїв у Fortnite</caption>
        <tr >
            <th rowspan="2">Герой</th>
            <th colspan="3" >Основні скіли</th>
            <th rowspan="6">
                <img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme11/resources/task3/fortnite.jpg" alt="">
            </th>
        </tr>

        <tr>
            <th>Швидкість</th>
            <th>Стрільба</th>
            <th>Будівництво</th>
            
            
        </tr>

        <tr>
            <td>Jonesy</td>
            <td>8</td>
            <td>9</td>
            <td>7</td>
            
        </tr>

        <tr>
            <td>Peely</td>
            <td>7</td>
            <td>6</td>
            <td>9</td>
        </tr>

        <tr>
            <td>Raven</td>
            <td>9</td>
            <td>8</td>
            <td>8</td>
        </tr>

        <tr>
            <td>Fishstick</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
        </tr>
    </table>
    
</body>
</html>
