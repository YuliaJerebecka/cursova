<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .house{
            position: relative;
            height: 300px;
        }

        .roof{
            position: absolute;
            border-left: 120px solid transparent;
            border-right: 120px solid transparent;
            border-bottom: 100px solid #cc3333;
        }

        .wall{
            background-color: #ffcc66;
            border: 2px solid #aa8800;
            position: absolute;
            top: 100px;
            width: 240px;
            height: 200px;
        }

        .door{
            background-color: #996633;
            border: 2px solid #664422;
            position: absolute;
            bottom: 0;
            left: 150px;
            width: 60px;
            height: 100px;
        }

        .window{
            background-color: #66ccff;
            border: 2px solid #3399ff;
            position: absolute;
            top: 150px;
            left: 50px;
            width: 60px;
            height: 60px;
        }
        

        
    </style>
</head>
<body>
    <h1>Мій будинок</h1>
    <div class="house">
        <div class="roof"></div>
        <div class="wall"></div>
        <div class="window"></div>
        <div class="door"></div>
    </div>
    

    
</body>
</html>
