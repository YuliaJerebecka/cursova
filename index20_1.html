<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: lightcyan;
            font-family: Arial;
            text-align: center;
        }

        .card{
            width: 300px;
            padding: 20px;
            border: 2px solid gray;
            background-color: white;
        }

        img{
            float: right;
            width: 100px;
            height: auto;
            border-radius: 50%;
            margin-left: 15px;
        }

        .name{
            color: darkblue;
        }
    </style>
</head>
<body>
    <div align="center">
        <div class="card">
            <img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme20/resources/task1/wizard_level12.png" alt="">
            <h2>Ім'я героя:</h2>
            <span class="name">
            <h2>Скай</h2>
        </span>
        <p>Рівень: 12</p>
        <p>Клас: Маг вітру</p>
        </div>
    </div>
</body>
</html>
