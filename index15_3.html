<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: lightblue;
            font-family: 'Courier New' ;
            text-align: center;
        }

        h2{
            text-align: center;
            color: #181855;
            margin-top: 20px;
        }

        .row{
            margin-bottom: 20px;
        }

        .skin-card{
           background-color: white;
           border: 3px solid #181855;
           width: 220px;
           text-align: center;
           margin: 10px;
           border-radius: 10px;
           display: inline-block;
        }

        img{
            width: 220px;
            height: auto;
        }

        p{
            background-color: #181855;
            color: goldenrod;
            font-size: 16px;
            font-weight: bold;
            margin: 0;
            padding: 10px 5px;
        }
    </style>
</head>
<body>
    <h2>Топ найпопулярніших скінів Fortnite</h2>
    <div class="row">
        <div class="skin-card">
            <img src="https://static.wikia.nocookie.net/fortnite/images/e/ea/Midas_-_Outfit_-_Fortnite.png/revision/latest?cb=20210317171749" alt="">
            <p>Midas – Легендарний</p>
        </div>

        <div class="skin-card">
            <img src="https://static.wikia.nocookie.net/fortnite/images/8/87/Lynx_%28v31.30%29_-_Outfit_-_Fortnite.png/revision/latest?cb=20241008144552" alt="">
            <p>Lynx – Епічний</p>
        </div>

        <div class="skin-card">
            <img src="https://static.wikia.nocookie.net/fortnite/images/3/32/Drift_%28New%29_-_Outfit_-_Fortnite.png/revision/latest?cb=20191006170630" alt="">
            <p>Drift – Легендарний</p>
        </div>
    </div>

    <div class="row">
        <div class="skin-card">
            <img src="https://static.wikia.nocookie.net/fortnite/images/f/fc/Peely_%28v30.00%29_-_Outfit_-_Fortnite.png/revision/latest?cb=20240524202045" alt="">
            <p>Peely – Епічний</p>
        </div>

        <div class="skin-card">
            <img src="https://static.wikia.nocookie.net/fortnite/images/7/7b/Aura_%28v30.00%29_-_Outfit_-_Fortnite.png/revision/latest?cb=20240524204317" alt="">
            <p>Aura – Рідкісний</p>
        </div>

        <div class="skin-card">
            <img src="https://static.wikia.nocookie.net/fortnite/images/d/d9/Raven_%28v33.20%29_-_Outfit_-_Fortnite.png/revision/latest?cb=20250118154216" alt="">
            <p>Raven – Легендарний</p>
        </div>



    </div>

</body>
</html>
