<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            text-align: center;
        }

        form{
            display: inline-block;
            background-color: lightgray;
            border: 2px solid mediumvioletred;
            width: 300px;
        }

        textarea{
            resize: none;
            width: 200px;
            height: 120px;
        }
    </style>
</head>
<body>
    <h1>Оформлення замовлення:</h1>
    <form>
            <h3>Ваші контактні дані:</h3>
            Прізвище <br>
            <input type="text" placeholder="Введіть прізвище" required> <br>
            Ім’я <br>
            <input type="text" placeholder="Введіть ім’я" required> <br>
            Країна замовлення <br>
            <input type="text" placeholder="Україна" disabled> <br>
            Обраний товар <br>
            <input type="text" placeholder="PlayStation 5" readonly> <br>
            Опис товару <br>
            <textarea readonly>Випробуйте міць нового ЦП, графічного процесора і SSD з особливою вбудованою системою введення і виведення, які перевертають уявлення про можливості PlayStation®.</textarea> <br>
            Коментар до замовлення <br>
            <textarea name="" id=""></textarea>
            <br>
            <input type="submit" value="Продовжити">
            <input type="reset" value="Очистити">
    </form> 
</body>
</html>
