<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, td, th{
            border: 2px solid black ;
        }

        th, td{
            text-align: center;
        }

        th{
            background-color: #ffee88;
            font-family: "Comic Sans MS";
        }

        caption{
            font-family: "Monotype Corsiva";
            font-size: 20px;
        }

        img{
            width: 50px;
            height: 50px;
        }

        .wood{
            background-color: burlywood;
        }

        .iron{
            background-color: lightgray;
        }

        .sword{
            background-color: lightslategray;
        }
    </style>
</head>
<body>
    <table align="center">
        <caption>Популярні елементи Minecraft</caption>

        <tr>
            <th>
                №
            </th>
            <th>
                Назва елемента
            </th>
            <th>
                Тип
            </th>
            <th>
                Ціна (у грі)
            </th>
            <th>
                Картинка
            </th>
        </tr>

        <tr>
            <td class="wood">
                1
            </td>
            <td class="wood">Дерев’яний блок</td>
            <td class="wood" >Будівельний</td>
            <td class="wood">1 монета</td>
            <td class="wood"><img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme10/resources/task2/wood_block.png" alt=""></td>
        </tr>

        <tr>
            <td class="iron">
                2
            </td class="iron">
            <td class="iron">Залізне кайло</td>
            <td class="iron">Інструмент</td>
            <td class="iron">5 монет</td>
            <td class="iron"><img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme10/resources/task2/iron_pickaxe.png" alt=""></td>
        </tr>

        <tr class="sword">
            <td>
                3
            </td>
            <td>Меч</td>
            <td>Зброя</td>
            <td>8 монет</td>
            <td><img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme10/resources/task2/sword.png" alt=""></td>
        </tr>
    </table>
    
</body>
</html>
